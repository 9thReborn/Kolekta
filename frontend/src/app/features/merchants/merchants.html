<h2>Merchants</h2>

<form class="inline-form" (ngSubmit)="createMerchant()">
  <input [(ngModel)]="newMerchantName" name="name" placeholder="Merchant name" required />
  <button type="submit" [disabled]="creating()">Add merchant</button>
</form>

@if (loading()){
  <p>Loading…</p>
}@else if (error()) {
  <p class="error">{{ error() }}</p>
}@else {
  <table>
    <thead>
    <tr><th>Name</th><th>Account Ref</th><th>ID</th><th></th></tr>
    </thead>
    <tbody>
      @for (m of merchants(); track m.merchantId) {
        <tr class="clickable" [routerLink]="['/merchants', m.merchantId, 'customers']">
          <td>{{ m.name }}</td>
          <td>{{ m.accountRef }}</td>
          <td>{{ m.merchantId }}</td>
          <td><button (click)="delete($event, m.merchantId)">Delete</button></td>
        </tr>
      }
    </tbody>
  </table>
}
