<h2>Overview</h2>
@if (overview(); as o) {
  <div class="stat-grid">
    <a class="stat" routerLink="/merchants">
      <span class="stat-label">Merchants</span>
      <span class="stat-value">{{ o.merchantCount }}</span>
    </a>
    <div class="stat">
      <span class="stat-label">Customers</span>
      <span class="stat-value">{{ o.customerCount }}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Total Collected</span>
      <span class="stat-value">{{ o.totalCollectedText }}</span>
    </div>
    <a class="stat" routerLink="/misdirected" [class.alert]="o.misdirectedOpenCount > 0">
      <span class="stat-label">Misdirected (open)</span>
      <span class="stat-value">{{ o.misdirectedOpenCount }}</span>
    </a>
  </div>
} @else {
  <p>Loading…</p>
}
